<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小資智慧記帳本</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 4rem); }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <div class="w-full max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative pb-20">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-brand-600 to-indigo-600 text-white px-4 pt-6 pb-4 sticky top-0 z-40 shadow-md">
            <div class="flex justify-between items-center mb-2">
                <div class="flex items-center space-x-2">
                    <div class="p-2 bg-white/10 rounded-xl">
                        <i data-lucide="wallet" class="w-6 h-6"></i>
                    </div>
                    <span class="text-xl font-bold tracking-wide">小資智慧記帳</span>
                </div>
                <div class="text-xs bg-white/20 px-2.5 py-1 rounded-full border border-white/10 flex items-center gap-1">
                    <i data-lucide="calendar" class="w-3 h-3"></i>
                    <span id="header-date">加載中...</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-4 py-4 space-y-4 no-scrollbar safe-bottom">
            
            <!-- Tab 1: 首頁 (Dashboard) -->
            <div id="tab-dashboard" class="space-y-4 tab-content">
                <!-- 總覽卡片 -->
                <div class="bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-2xl p-5 shadow-xl relative overflow-hidden">
                    <div class="absolute -right-8 -bottom-8 text-white/5 pointer-events-none">
                        <i data-lucide="line-chart" class="w-32 h-32"></i>
                    </div>
                    <p class="text-slate-400 text-xs font-medium uppercase tracking-wider mb-1" id="greeting-text">本月結餘</p>
                    <h2 class="text-3xl font-extrabold mb-5 tracking-tight" id="dashboard-balance">$0</h2>
                    
                    <div class="grid grid-cols-2 gap-4 border-t border-slate-700/50 pt-4">
                        <div>
                            <div class="flex items-center space-x-1.5 text-slate-400 text-xs mb-1">
                                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                                <span>總收入</span>
                            </div>
                            <p class="text-base font-bold text-emerald-400" id="dashboard-income">$0</p>
                        </div>
                        <div>
                            <div class="flex items-center space-x-1.5 text-slate-400 text-xs mb-1">
                                <span class="w-2 h-2 rounded-full bg-rose-500"></span>
                                <span>總支出</span>
                            </div>
                            <p class="text-base font-bold text-rose-400" id="dashboard-expense">$0</p>
                        </div>
                    </div>
                </div>

                <!-- 【新增功能】閃電快捷記帳 -->
                <div class="mb-4">
                    <h3 class="text-sm font-bold text-slate-800 mb-3 flex items-center gap-1.5">
                        <i data-lucide="zap" class="w-4 h-4 text-amber-500"></i> 閃電快捷記帳
                    </h3>
                    <div class="grid grid-cols-2 gap-3" id="quick-log-grid">
                        <!-- 動態載入快捷按鈕 -->
                    </div>
                </div>

                <!-- 最近記帳明細 -->
                <div class="flex justify-between items-center mt-6 mb-2">
                    <h3 class="text-sm font-bold text-slate-800">最近明細</h3>
                    <button onclick="switchTab('history')" class="text-xs text-brand-600 font-semibold hover:underline flex items-center">
                        查看全部 <i data-lucide="chevron-right" class="w-3 h-3 ml-0.5"></i>
                    </button>
                </div>
                <div class="space-y-2.5" id="recent-transactions-list"></div>
            </div>

            <!-- Tab 2: 歷史明細 -->
            <div id="tab-history" class="space-y-4 tab-content hidden">
                <div class="flex items-center gap-2">
                    <div class="relative flex-1">
                        <select id="filter-month" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium focus:outline-none appearance-none pr-8"></select>
                        <i data-lucide="chevron-down" class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                    <div class="relative flex-1">
                        <select id="filter-type" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium focus:outline-none appearance-none pr-8">
                            <option value="all">全部類型</option>
                            <option value="expense">支出</option>
                            <option value="income">收入</option>
                        </select>
                        <i data-lucide="chevron-down" class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
                <div class="space-y-3" id="history-transactions-list"></div>
            </div>

            <!-- Tab 3: 分析圖表 -->
            <div id="tab-analytics" class="space-y-4 tab-content hidden">
                <!-- 圖表部分保持不變 -->
                <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-1.5">
                        <i data-lucide="pie-chart" class="w-4 h-4 text-brand-500"></i>
                        <span>支出分類比例</span>
                    </h3>
                    <div class="relative w-full h-64 flex justify-center items-center">
                        <canvas id="categoryChart"></canvas>
                        <div id="no-data-chart" class="absolute inset-0 bg-white flex flex-col items-center justify-center text-slate-400 hidden">
                            <i data-lucide="folder-open" class="w-10 h-10 mb-2"></i>
                            <span class="text-xs">本月無數據</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab 4: 系統設定 -->
            <div id="tab-settings" class="space-y-4 tab-content hidden">
                <!-- 【新增功能】自訂快捷記帳 -->
                <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm space-y-4">
                    <h3 class="text-sm font-bold text-slate-700 pb-2 border-b border-slate-100 flex items-center gap-2">
                        <i data-lucide="zap" class="w-4 h-4 text-amber-500"></i> 快捷記帳設定
                    </h3>
                    <p class="text-xs text-slate-400">自訂首頁的 4 個閃電快捷按鈕，一鍵記下常用開銷。</p>
                    <button onclick="openQuickLogSettingsModal()" class="w-full py-2.5 bg-brand-50 hover:bg-brand-100 text-brand-600 rounded-xl text-sm font-bold transition">
                        修改快捷項目
                    </button>
                </div>

                <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm space-y-4">
                    <h3 class="text-sm font-bold text-slate-700 pb-2 border-b border-slate-100">數據備份</h3>
                    <button onclick="exportData()" class="w-full flex items-center justify-between p-3 bg-slate-50 hover:bg-slate-100 rounded-xl transition">
                        <span class="text-sm font-semibold text-slate-700">匯出記帳數據</span>
                        <i data-lucide="download" class="w-5 h-5 text-slate-400"></i>
                    </button>
                </div>

                <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm space-y-4">
                    <h3 class="text-sm font-bold text-rose-600 pb-2 border-b border-slate-100">危險區域</h3>
                    <button onclick="requestClearAllData()" class="w-full flex items-center gap-3 p-3 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl transition">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                        <span class="text-sm font-semibold">清除所有記帳數據</span>
                    </button>
                </div>
            </div>

        </main>

        <!-- 浮動按鈕 & 導覽列 -->
        <button id="fab-add" onclick="openAddModal()" class="absolute right-6 bottom-24 bg-gradient-to-r from-brand-500 to-indigo-600 text-white p-4 rounded-full shadow-lg hover:scale-105 transition z-40">
            <i data-lucide="plus" class="w-7 h-7"></i>
        </button>

        <nav class="absolute bottom-0 left-0 right-0 h-16 bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around items-center z-40 px-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center justify-center w-16 h-full text-brand-600 font-bold"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-[10px] mt-1">首頁</span></button>
            <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center justify-center w-16 h-full text-slate-400"><i data-lucide="list-ordered" class="w-5 h-5"></i><span class="text-[10px] mt-1">明細</span></button>
            <button onclick="switchTab('analytics')" id="nav-analytics" class="flex flex-col items-center justify-center w-16 h-full text-slate-400"><i data-lucide="pie-chart" class="w-5 h-5"></i><span class="text-[10px] mt-1">分析</span></button>
            <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center justify-center w-16 h-full text-slate-400"><i data-lucide="sliders" class="w-5 h-5"></i><span class="text-[10px] mt-1">設定</span></button>
        </nav>

        <!-- ------------------------------ MODALS (對話框) ------------------------------ -->
        
        <!-- 【新增功能】通用型確認對話框 -->
        <div id="action-confirm-modal" class="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-6 opacity-0 pointer-events-none transition-opacity duration-200">
            <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4 transform scale-95 transition-transform duration-200" id="action-modal-box">
                <div class="flex items-center gap-3" id="action-modal-icon-container">
                    <div class="p-2.5 bg-brand-50 text-brand-600 rounded-xl">
                        <i data-lucide="help-circle" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800" id="action-modal-title">確認操作</h3>
                </div>
                <p class="text-sm text-slate-500 leading-relaxed font-medium" id="action-modal-message">您確定要執行此操作嗎？</p>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeActionConfirmModal()" class="flex-1 py-3 border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold transition">
                        取消
                    </button>
                    <button id="action-modal-confirm-btn" onclick="executePendingAction()" class="flex-1 py-3 bg-brand-600 text-white hover:bg-brand-700 rounded-xl text-sm font-bold shadow-md transition">
                        確認
                    </button>
                </div>
            </div>
        </div>

        <!-- 【新增功能】修改快捷設定對話框 -->
        <div id="quick-log-settings-modal" class="fixed inset-0 bg-black/60 z-[55] flex items-end justify-center opacity-0 pointer-events-none transition-opacity duration-300">
            <div class="absolute inset-0" onclick="closeQuickLogSettingsModal()"></div>
            <div class="bg-white w-full max-w-md rounded-t-3xl p-6 relative z-10 transform translate-y-full transition-transform duration-300 max-h-[85vh] overflow-y-auto">
                <div class="w-12 h-1 bg-slate-300 rounded-full mx-auto mb-4 cursor-pointer" onclick="closeQuickLogSettingsModal()"></div>
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-lg font-bold text-slate-800">自訂快捷項目</h3>
                    <button onclick="closeQuickLogSettingsModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <form id="quick-log-form" class="space-y-5" onsubmit="saveQuickLogSettings(event)">
                    <!-- 動態生成 4 個輸入欄位 -->
                    <div id="quick-log-inputs-container" class="space-y-4"></div>
                    <button type="submit" class="w-full bg-brand-600 text-white font-bold py-3.5 rounded-xl shadow-lg mt-4">儲存快捷設定</button>
                </form>
            </div>
        </div>

        <!-- 一般新增記帳彈窗 (簡化展示，維持原功能) -->
        <div id="add-modal" class="fixed inset-0 bg-black/60 z-50 flex items-end justify-center opacity-0 pointer-events-none transition-opacity duration-300">
            <div class="absolute inset-0" onclick="closeAddModal()"></div>
            <div class="bg-white w-full max-w-md rounded-t-3xl p-6 relative z-10 transform translate-y-full transition-transform duration-300">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold">新增紀錄</h3>
                    <button onclick="closeAddModal()"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <form onsubmit="saveTransaction(event)" class="space-y-3">
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button type="button" id="btn-type-expense" onclick="setTransactionType('expense')" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow">支出</button>
                        <button type="button" id="btn-type-income" onclick="setTransactionType('income')" class="flex-1 py-2 text-sm font-bold text-slate-500">收入</button>
                    </div>
                    <input type="number" id="input-amount" required placeholder="金額 $" class="w-full text-2xl font-black border-b-2 py-1 focus:outline-none">
                    <div class="grid grid-cols-4 gap-2 py-2" id="category-picker"></div>
                    <input type="date" id="input-date" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
                    <input type="text" id="input-note" placeholder="項目說明" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
                    <button type="submit" class="w-full bg-brand-600 text-white font-bold py-3 rounded-xl shadow-lg">確認記一筆</button>
                </form>
            </div>
        </div>

        <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white text-xs px-4 py-2.5 rounded-full shadow-lg opacity-0 transition-all z-50 pointer-events-none">
            <span id="toast-text"></span>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        const categories = {
            expense: [
                { id: '食', name: '餐飲伙食', icon: 'utensils', color: 'bg-amber-500' },
                { id: '住', name: '居住房屋', icon: 'home', color: 'bg-rose-500' },
                { id: '行', name: '交通出行', icon: 'car', color: 'bg-sky-500' },
                { id: '樂', name: '娛樂休閒', icon: 'clapperboard', color: 'bg-violet-500' },
                { id: '衣', name: '美妝服飾', icon: 'shirt', color: 'bg-pink-500' },
                { id: '育', name: '進修學習', icon: 'book-open', color: 'bg-emerald-500' },
                { id: '醫', name: '醫療保健', icon: 'heart-pulse', color: 'bg-teal-500' },
                { id: '他', name: '其他支出', icon: 'hash', color: 'bg-slate-500' }
            ],
            income: [
                { id: '薪資', name: '固定薪資', icon: 'wallet', color: 'bg-emerald-600' }
            ]
        };

        let state = {
            transactions: [],
            quickLogs: [],
            activeTab: 'dashboard',
            currentModalType: 'expense',
            selectedCategory: '食',
            filterMonth: ''
        };

        let pendingAction = null; // 用於儲存對話框確認後要執行的函數

        window.onload = function() {
            // 讀取歷史資料
            const storedTxs = localStorage.getItem('pocket_ledger_data');
            if (storedTxs) state.transactions = JSON.parse(storedTxs);

            // 讀取快捷記帳設定 (為您加入貼近生活的情境預設值)
            const storedQuickLogs = localStorage.getItem('pocket_ledger_quick_logs');
            if (storedQuickLogs) {
                state.quickLogs = JSON.parse(storedQuickLogs);
            } else {
                state.quickLogs = [
                    { name: '午餐便當', amount: 120, category: '食' },
                    { name: '黑貓罐頭', amount: 60, category: '他' },
                    { name: '教學文具', amount: 100, category: '育' },
                    { name: '悠遊卡', amount: 500, category: '行' }
                ];
                localStorage.setItem('pocket_ledger_quick_logs', JSON.stringify(state.quickLogs));
            }

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('input-date').value = today;
            state.filterMonth = today.substring(0, 7);

            initMonthSelectors();
            renderCategoryPicker();
            updateApp();
        };

        /* ---------------- 對話框核心邏輯 ---------------- */
        function openActionConfirmModal(title, message, isDanger, callback) {
            document.getElementById('action-modal-title').innerText = title;
            document.getElementById('action-modal-message').innerText = message;
            pendingAction = callback;

            const modal = document.getElementById('action-confirm-modal');
            const box = document.getElementById('action-modal-box');
            const btn = document.getElementById('action-modal-confirm-btn');
            const iconContainer = document.getElementById('action-modal-icon-container');

            // 根據是否為危險操作(刪除)改變對話框顏色
            if (isDanger) {
                btn.className = "flex-1 py-3 bg-rose-600 text-white hover:bg-rose-700 rounded-xl text-sm font-bold shadow-md transition";
                iconContainer.innerHTML = `<div class="p-2.5 bg-rose-50 text-rose-600 rounded-xl"><i data-lucide="alert-triangle" class="w-6 h-6"></i></div><h3 class="text-lg font-bold text-rose-600" id="action-modal-title">${title}</h3>`;
            } else {
                btn.className = "flex-1 py-3 bg-brand-600 text-white hover:bg-brand-700 rounded-xl text-sm font-bold shadow-md transition";
                iconContainer.innerHTML = `<div class="p-2.5 bg-brand-50 text-brand-600 rounded-xl"><i data-lucide="zap" class="w-6 h-6"></i></div><h3 class="text-lg font-bold text-slate-800" id="action-modal-title">${title}</h3>`;
            }

            modal.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-95');
            box.classList.add('scale-100');
            lucide.createIcons();
        }

        function closeActionConfirmModal() {
            const modal = document.getElementById('action-confirm-modal');
            const box = document.getElementById('action-modal-box');
            modal.classList.add('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            pendingAction = null;
        }

        function executePendingAction() {
            if (pendingAction) pendingAction();
            closeActionConfirmModal();
        }

        /* ---------------- 快捷記帳邏輯 ---------------- */
        function renderQuickLogs() {
            const container = document.getElementById('quick-log-grid');
            container.innerHTML = '';
            
            state.quickLogs.forEach((log, index) => {
                const meta = categories.expense.find(c => c.id === log.category) || categories.expense[0];
                const btn = document.createElement('button');
                btn.className = "bg-white border border-slate-100 p-3 rounded-xl shadow-sm hover:border-brand-300 hover:shadow-md transition text-left flex items-center justify-between";
                btn.onclick = () => requestQuickLog(index);
                btn.innerHTML = `
                    <div class="flex items-center gap-2.5">
                        <div class="p-2 ${meta.color} text-white rounded-lg"><i data-lucide="${meta.icon}" class="w-4 h-4"></i></div>
                        <div>
                            <p class="text-xs font-bold text-slate-700">${log.name}</p>
                            <p class="text-[10px] text-slate-400 font-medium">$${log.amount}</p>
                        </div>
                    </div>
                    <i data-lucide="plus-circle" class="w-4 h-4 text-slate-300"></i>
                `;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        // 觸發快捷記帳前的對話框確認
        function requestQuickLog(index) {
            const log = state.quickLogs[index];
            openActionConfirmModal(
                "確認快捷記帳", 
                `確定要記一筆「${log.name}」支出 $${log.amount} 嗎？`, 
                false, 
                () => {
                    const newTx = {
                        id: Date.now().toString(),
                        type: 'expense',
                        amount: Number(log.amount),
                        category: log.category,
                        payment: '現金',
                        date: new Date().toISOString().split('T')[0],
                        note: log.name
                    };
                    state.transactions.unshift(newTx);
                    localStorage.setItem('pocket_ledger_data', JSON.stringify(state.transactions));
                    updateApp();
                    showToast('已完成快捷記帳！');
                }
            );
        }

        /* ---------------- 自訂快捷設定邏輯 ---------------- */
        function openQuickLogSettingsModal() {
            const container = document.getElementById('quick-log-inputs-container');
            container.innerHTML = '';
            
            state.quickLogs.forEach((log, i) => {
                const options = categories.expense.map(c => 
                    `<option value="${c.id}" ${log.category === c.id ? 'selected' : ''}>${c.name}</option>`
                ).join('');

                container.innerHTML += `
                    <div class="p-3 bg-slate-50 border border-slate-200 rounded-xl space-y-2">
                        <p class="text-xs font-bold text-slate-500 mb-2">快捷按鈕 ${i + 1}</p>
                        <div class="flex gap-2">
                            <input type="text" id="ql-name-${i}" value="${log.name}" placeholder="項目名稱" required class="flex-1 px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-brand-500 outline-none">
                            <input type="number" id="ql-amount-${i}" value="${log.amount}" placeholder="金額" required class="w-24 px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-brand-500 outline-none">
                        </div>
                        <select id="ql-cat-${i}" class="w-full px-3 py-2 text-sm rounded-lg border bg-white outline-none">
                            ${options}
                        </select>
                    </div>
                `;
            });

            const modal = document.getElementById('quick-log-settings-modal');
            const inner = modal.querySelector('div:nth-child(2)');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            inner.classList.remove('translate-y-full');
        }

        function closeQuickLogSettingsModal() {
            const modal = document.getElementById('quick-log-settings-modal');
            const inner = modal.querySelector('div:nth-child(2)');
            modal.classList.add('opacity-0', 'pointer-events-none');
            inner.classList.add('translate-y-full');
        }

        function saveQuickLogSettings(e) {
            e.preventDefault();
            for(let i=0; i<4; i++) {
                state.quickLogs[i].name = document.getElementById(`ql-name-${i}`).value;
                state.quickLogs[i].amount = Number(document.getElementById(`ql-amount-${i}`).value);
                state.quickLogs[i].category = document.getElementById(`ql-cat-${i}`).value;
            }
            localStorage.setItem('pocket_ledger_quick_logs', JSON.stringify(state.quickLogs));
            renderQuickLogs();
            closeQuickLogSettingsModal();
            showToast('快捷項目已更新！');
        }

        /* ---------------- 刪除與其他邏輯 ---------------- */
        function requestDeleteTransaction(id) {
            openActionConfirmModal(
                "刪除紀錄", 
                "您確定要永久刪除這筆記帳明細嗎？刪除後無法復原。", 
                true, // 標示為危險操作(紅色對話框)
                () => {
                    state.transactions = state.transactions.filter(t => t.id !== id);
                    localStorage.setItem('pocket_ledger_data', JSON.stringify(state.transactions));
                    updateApp();
                    showToast('已刪除紀錄');
                }
            );
        }

        function requestClearAllData() {
            openActionConfirmModal(
                "清空所有數據", 
                "警告：這將會刪除您所有的記帳歷史！強烈建議您先匯出備份檔案。確定要清除嗎？", 
                true,
                () => {
                    state.transactions = [];
                    localStorage.setItem('pocket_ledger_data', JSON.stringify(state.transactions));
                    updateApp();
                    showToast('數據已全部清空！');
                }
            );
        }

        // 基本的 App 更新與渲染
        function updateApp() {
            document.getElementById('header-date').innerText = state.filterMonth.replace('-', ' 年 ') + ' 月';
            
            let income = 0, expense = 0;
            const currentMonthTxs = state.transactions.filter(t => t.date.startsWith(state.filterMonth));
            currentMonthTxs.forEach(t => t.type === 'income' ? income += t.amount : expense += t.amount);
            
            document.getElementById('dashboard-balance').innerText = `$${income - expense}`;
            document.getElementById('dashboard-income').innerText = `$${income}`;
            document.getElementById('dashboard-expense').innerText = `$${expense}`;

            renderQuickLogs();
            renderHistoryTransactions();
            lucide.createIcons();
        }

        function renderHistoryTransactions() {
            const container = document.getElementById('history-transactions-list');
            container.innerHTML = '';
            const filtered = state.transactions.filter(t => t.date.startsWith(state.filterMonth));
            
            filtered.forEach(t => {
                const meta = (t.type==='expense' ? categories.expense : categories.income).find(c => c.id === t.category) || categories.expense[0];
                const sign = t.type === 'income' ? '+' : '-';
                const color = t.type === 'income' ? 'text-emerald-600' : 'text-slate-800';
                
                container.innerHTML += `
                    <div class="bg-white p-3.5 rounded-xl border border-slate-100 flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="p-2.5 ${meta.color} text-white rounded-xl"><i data-lucide="${meta.icon}" class="w-5 h-5"></i></div>
                            <div>
                                <p class="text-sm font-semibold">${t.note}</p>
                                <p class="text-[10px] text-slate-400">${t.date}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold ${color}">${sign}$${t.amount}</span>
                            <button onclick="requestDeleteTransaction('${t.id}')" class="text-slate-300 hover:text-rose-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        // 其餘輔助函數
        function initMonthSelectors() { /* 簡化版面留空，實際功能需補上原本的迴圈 */ }
        function switchTab(tabId) { 
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.replace('text-brand-600', 'text-slate-400'));
            document.getElementById(`nav-${tabId}`).classList.replace('text-slate-400', 'text-brand-600');
            if(tabId === 'dashboard') updateApp();
        }
        function openAddModal() { document.getElementById('add-modal').classList.remove('opacity-0', 'pointer-events-none'); document.getElementById('add-modal').children[1].classList.remove('translate-y-full'); }
        function closeAddModal() { document.getElementById('add-modal').classList.add('opacity-0', 'pointer-events-none'); document.getElementById('add-modal').children[1].classList.add('translate-y-full'); }
        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 2500);
        }
        function renderCategoryPicker() { /* 原有函數 */ }
        function setTransactionType(type) { /* 原有函數 */ }
        function saveTransaction(e) { /* 原有函數，儲存後呼叫 updateApp() 即可 */ e.preventDefault(); closeAddModal(); }
    </script>
</body>
</html>
